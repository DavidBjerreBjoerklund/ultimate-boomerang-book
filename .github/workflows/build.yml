name: build

on:
  push:
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install TeX
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-lang-english
      - name: Build PDF
        run: latexmk -pdf -interaction=nonstopmode -synctex=1 UBB.tex
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: UBB-pdf-linux
          path: UBB.pdf

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MiKTeX
        run: choco install miktex -y --no-progress
        shell: pwsh
      - name: Build PDF
        run: latexmk -pdf -interaction=nonstopmode -synctex=1 UBB.tex
        shell: pwsh
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: UBB-pdf-windows
          path: UBB.pdf
